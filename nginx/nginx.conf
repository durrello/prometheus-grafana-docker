events {}

http {
    server {
        listen 80;

        # Serve the sample static page.
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # stub_status endpoint scraped by nginx-prometheus-exporter.
        # Restricted to internal Docker networks only.
        location /stub_status {
            stub_status on;
            access_log off;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;
        }
    }
}
