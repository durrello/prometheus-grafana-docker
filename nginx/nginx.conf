# Minimal nginx config that exposes the stub_status endpoint the
# nginx-prometheus-exporter scrapes. Without this, the exporter cannot
# collect metrics and the 'nginx' Prometheus target stays down.
events {}

http {
    server {
        listen 80;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }

        # Metrics endpoint consumed by nginxexporter (--nginx.scrape-uri).
        location /stub_status {
            stub_status on;
            access_log off;
        }
    }
}
