# Minimal Alertmanager config. Routes all alerts to a single receiver.
# Replace the webhook/email below with your real notification channel.
global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: 'default'
    # Placeholder receiver. Add slack_configs / email_configs / webhook_configs here.
    # Example (Slack):
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/XXX/YYY/ZZZ'
    #     channel: '#alerts'
