global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alerting rules. Without this block the rules in alerts.yml are never
# evaluated — a common silent misconfiguration.
rule_files:
  - /etc/prometheus/alerts.yml

# Send firing alerts to Alertmanager.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['nodeexporter:9100']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginxexporter:9113']
